user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 768;
    use epoll;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;

    gzip on;

    # Upstream backend pool with 4 Python instances
    upstream backend_pool {
        least_conn;

        server 10.0.3.10:8080 max_fails=3 fail_timeout=30s;
        server 10.0.3.11:8080 max_fails=3 fail_timeout=30s;
        server 10.0.3.12:8080 max_fails=3 fail_timeout=30s;
        server 10.0.3.13:8080 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # HTTP server block
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        # Proxy settings for backend
        location / {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint (internal)
        location /nginx-health {
            access_log off;
            return 200 "NGINX OK\n";
            add_header Content-Type text/plain;
        }

        # Deny direct access to nginx status
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/16;
            deny all;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
